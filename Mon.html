<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Monopoly GO – Карти</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

    :root {
      --bg: #12203b;
      --surface: #1c2f52;
      --surface2: #243764;
      --gold: #f5c842;
      --gold-dark: #c9a020;
      --gold-glow: rgba(245,200,66,0.25);
      --red: #e8453c;
      --red-bg: rgba(232,69,60,0.18);
      --green: #2ecc71;
      --green-bg: rgba(46,204,113,0.15);
      --gray: #7a8ba8;
      --text: #e8eef8;
      --border: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overscroll-behavior: none;
    }

    /* ─── HEADER ─── */
    .header {
      background: var(--surface);
      padding: 14px 18px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--gold);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-icon { font-size: 28px; }
    .header-title { font-size: 18px; font-weight: 900; color: var(--gold); letter-spacing: -0.3px; }
    .header-sub { font-size: 10px; color: var(--gray); font-weight: 700; margin-top: 1px; }

    .reset-btn {
      background: transparent;
      border: 1.5px solid var(--gray);
      color: var(--gray);
      padding: 6px 13px;
      border-radius: 20px;
      font-family: 'Nunito', sans-serif;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.15s;
    }
    .reset-btn:active { background: var(--gray); color: var(--bg); }

    /* ─── ACCOUNT TABS ─── */
    .account-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 8px 10px;
      gap: 6px;
    }
    .acc-tab {
      border-radius: 12px;
      border: 2px solid transparent;
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      padding: 8px 4px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      transition: all 0.18s;
    }
    .acc-tab.active { background: var(--gold); border-color: var(--gold-dark); }
    .acc-tab-icon { font-size: 20px; }
    .acc-tab-name { font-size: 9px; font-weight: 900; color: var(--text); letter-spacing: 0.5px; text-transform: uppercase; }
    .acc-tab.active .acc-tab-name { color: var(--bg); }
    .acc-tab-badge {
      font-size: 9px;
      font-weight: 800;
      color: var(--gray);
      background: rgba(0,0,0,0.25);
      padding: 1px 5px;
      border-radius: 10px;
      min-width: 30px;
      text-align: center;
    }
    .acc-tab.active .acc-tab-badge { color: var(--bg); background: rgba(0,0,0,0.2); }
    .acc-tab-badge.has-missing { color: var(--red); }
    .acc-tab.active .acc-tab-badge.has-missing { color: #c0392b; }

    /* ─── MAIN ─── */
    .main { padding: 10px 12px 110px; }

    /* ─── PAGE ACCORDION ─── */
    .page-block {
      margin-bottom: 8px;
      border-radius: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .page-block.has-missing { border-color: rgba(232,69,60,0.35); }

    .page-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px;
      cursor: pointer;
      user-select: none;
    }
    .page-head:active { background: rgba(255,255,255,0.04); }

    .page-left { display: flex; align-items: center; gap: 9px; }
    .page-num {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--gold);
      color: var(--bg);
      font-size: 11px;
      font-weight: 900;
      display: flex; align-items: center; justify-content: center;
    }
    .page-title { font-size: 13px; font-weight: 800; color: var(--gold); }

    .page-right { display: flex; align-items: center; gap: 8px; }
    .page-status { font-size: 11px; font-weight: 700; }
    .page-status.ok { color: var(--green); }
    .page-status.bad { color: var(--red); }
    .chevron { font-size: 12px; color: var(--gray); transition: transform 0.2s; }
    .page-block.open .chevron { transform: rotate(180deg); }

    .page-body { display: none; padding: 0 14px 14px; }
    .page-block.open .page-body { display: block; }

    /* ─── PAGE TOOLBAR ─── */
    .page-toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-bottom: 8px;
    }
    .mini-btn {
      font-family: 'Nunito', sans-serif;
      font-size: 10px;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 10px;
      border: 1.5px solid;
      cursor: pointer;
      transition: all 0.15s;
    }
    .mini-btn.none-btn { border-color: var(--gray); color: var(--gray); background: transparent; }
    .mini-btn.none-btn:active { background: var(--gray); color: var(--bg); }
    .mini-btn.all-btn { border-color: var(--red); color: var(--red); background: transparent; }
    .mini-btn.all-btn:active { background: var(--red); color: white; }

    /* ─── CARD GRID ─── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
    }
    .card-btn {
      aspect-ratio: 1;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      transition: all 0.14s;
      min-height: 48px;
    }
    .card-btn .card-num {
      font-size: 16px;
      font-weight: 900;
      color: var(--gray);
    }
    .card-btn .card-label {
      font-size: 8px;
      font-weight: 700;
      color: var(--gray);
      opacity: 0.6;
    }
    .card-btn.missing {
      background: var(--red-bg);
      border-color: var(--red);
    }
    .card-btn.missing .card-num { color: var(--red); }
    .card-btn.missing .card-label { color: var(--red); opacity: 0.8; }
    .card-btn:active { transform: scale(0.9); }

    /* ─── CALCULATE BTN ─── */
    .calc-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 10px 14px 22px;
      background: linear-gradient(to top, var(--bg) 65%, transparent);
      z-index: 200;
    }
    .calc-btn {
      width: 100%;
      padding: 16px;
      background: var(--gold);
      color: var(--bg);
      border: none;
      border-radius: 16px;
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 4px 24px var(--gold-glow);
      letter-spacing: 0.2px;
      transition: all 0.15s;
    }
    .calc-btn:active { transform: scale(0.97); background: var(--gold-dark); }

    /* ─── MODAL ─── */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 500;
      backdrop-filter: blur(5px);
      align-items: flex-end;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 22px 22px 0 0;
      width: 100%;
      max-height: 88dvh;
      display: flex;
      flex-direction: column;
      border-top: 2px solid var(--gold);
    }
    .modal-drag { width: 38px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 10px auto 0; }
    .modal-head {
      padding: 14px 18px 10px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-size: 17px; font-weight: 900; color: var(--gold); }
    .modal-close {
      background: rgba(255,255,255,0.1); border: none; color: var(--text);
      width: 30px; height: 30px; border-radius: 50%; font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-family: 'Nunito', sans-serif;
    }
    .modal-scroll { overflow-y: auto; padding: 14px 16px 32px; flex: 1; }
    .modal-scroll::-webkit-scrollbar { width: 3px; }
    .modal-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    /* ─── RESULT CARDS ─── */
    .result-summary {
      background: rgba(245,200,66,0.1);
      border: 1px solid rgba(245,200,66,0.3);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 14px;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.7;
    }
    .result-summary .highlight { color: var(--gold); }
    .result-summary .good { color: var(--green); }
    .result-summary .bad { color: var(--red); }

    .recv-block { margin-bottom: 18px; }
    .recv-label {
      font-size: 12px; font-weight: 900;
      color: var(--text);
      margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .recv-label-icon { font-size: 18px; }

    .transfer-row {
      border-radius: 10px;
      padding: 10px 13px;
      margin-bottom: 6px;
      border-left: 3px solid var(--green);
      background: var(--green-bg);
    }
    .transfer-row.warn {
      border-left-color: var(--red);
      background: var(--red-bg);
    }
    .transfer-from {
      font-size: 11px; font-weight: 800;
      color: var(--green); margin-bottom: 5px;
    }
    .transfer-row.warn .transfer-from { color: var(--red); }
    .transfer-cards {
      display: flex; flex-wrap: wrap; gap: 4px;
    }
    .card-pill {
      background: rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
    }

    .empty-state {
      text-align: center;
      padding: 28px 16px;
      color: var(--gray);
    }
    .empty-state .e-icon { font-size: 52px; margin-bottom: 10px; }
    .empty-state .e-title { font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .empty-state .e-sub { font-size: 12px; font-weight: 600; line-height: 1.6; }

    .success-state {
      text-align: center;
      padding: 32px 16px;
    }
    .success-state .s-icon { font-size: 60px; margin-bottom: 12px; }
    .success-state .s-title { font-size: 20px; font-weight: 900; color: var(--green); margin-bottom: 6px; }
    .success-state .s-sub { font-size: 13px; font-weight: 600; color: var(--gray); }

    .divider { height: 1px; background: var(--border); margin: 10px 0 14px; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <span class="header-icon">🎲</span>
    <div>
      <div class="header-title">Monopoly GO</div>
      <div class="header-sub">ТРЕКЕР НА КАРТИ • 4 АКАУНТА</div>
    </div>
  </div>
  <button class="reset-btn" onclick="resetAll()">↺ Нулирай</button>
</div>

<!-- ACCOUNT TABS -->
<div class="account-bar" id="account-bar"></div>

<!-- MAIN -->
<div class="main" id="main"></div>

<!-- CALCULATE BUTTON -->
<div class="calc-bar">
  <button class="calc-btn" onclick="calculate()">⚡ Изчисли трансфери</button>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="modal-head">
      <div class="modal-title">📋 План за трансфери</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-scroll" id="modal-body"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════
const N_ACC   = 4;
const N_PAGES = 21;
const N_CARDS = 9;

const ACC_ICONS  = ['🔴','🔵','🟢','🟡'];
const ACC_NAMES  = ['Акаунт 1','Акаунт 2','Акаунт 3','Акаунт 4'];
const ACC_SHORT  = ['АКТ 1','АКТ 2','АКТ 3','АКТ 4'];

// missing[a][p][c] = true → карта липсва
let missing = [];
let currentAcc = 0;

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
function initState() {
  missing = Array.from({length: N_ACC}, () =>
    Array.from({length: N_PAGES}, () => new Array(N_CARDS).fill(false))
  );
}

function loadState() {
  try {
    const s = localStorage.getItem('mgo_v2');
    if (s) missing = JSON.parse(s);
    else initState();
  } catch { initState(); }
}

function saveState() {
  try { localStorage.setItem('mgo_v2', JSON.stringify(missing)); } catch {}
}

// ════════════════════════════════════════
//  COUNTS
// ════════════════════════════════════════
function countMissing(a) {
  return missing[a].flat().filter(Boolean).length;
}
function pageCount(a, p) {
  return missing[a][p].filter(Boolean).length;
}

// ════════════════════════════════════════
//  RENDER TABS
// ════════════════════════════════════════
function renderTabs() {
  const bar = document.getElementById('account-bar');
  bar.innerHTML = '';
  for (let a = 0; a < N_ACC; a++) {
    const cnt = countMissing(a);
    const div = document.createElement('div');
    div.className = 'acc-tab' + (a === currentAcc ? ' active' : '');
    div.onclick = () => switchAcc(a);
    div.innerHTML = `
      <span class="acc-tab-icon">${ACC_ICONS[a]}</span>
      <span class="acc-tab-name">${ACC_SHORT[a]}</span>
      <span class="acc-tab-badge ${cnt > 0 ? 'has-missing' : ''}">${cnt > 0 ? cnt + ' ✗' : '✓ OK'}</span>
    `;
    bar.appendChild(div);
  }
}

// ════════════════════════════════════════
//  RENDER PAGES
// ════════════════════════════════════════
function renderPages() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  for (let p = 0; p < N_PAGES; p++) {
    const cnt = pageCount(currentAcc, p);
    const open = cnt > 0;
    const block = document.createElement('div');
    block.id = `pb-${p}`;
    block.className = `page-block${open ? ' open has-missing' : ''}`;

    block.innerHTML = `
      <div class="page-head" onclick="togglePage(${p})">
        <div class="page-left">
          <div class="page-num">${p+1}</div>
          <div class="page-title">Страница ${p+1}</div>
        </div>
        <div class="page-right">
          <span class="page-status ${cnt === 0 ? 'ok' : 'bad'}" id="pst-${p}">
            ${cnt === 0 ? '✓ Пълна' : cnt + ' липсват'}
          </span>
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="page-body">
        <div class="page-toolbar">
          <button class="mini-btn none-btn" onclick="markPageNone(event,${p})">✓ Имам всички</button>
          <button class="mini-btn all-btn" onclick="markPageAll(event,${p})">✗ Липсват всички</button>
        </div>
        <div class="cards-grid" id="grid-${p}"></div>
      </div>
    `;
    main.appendChild(block);
    renderCards(p);
  }
}

function renderCards(p) {
  const grid = document.getElementById(`grid-${p}`);
  if (!grid) return;
  grid.innerHTML = '';
  for (let c = 0; c < N_CARDS; c++) {
    const m = missing[currentAcc][p][c];
    const btn = document.createElement('button');
    btn.className = `card-btn${m ? ' missing' : ''}`;
    btn.id = `card-${p}-${c}`;
    btn.innerHTML = `<span class="card-num">${c+1}</span><span class="card-label">карта</span>`;
    btn.onclick = () => toggleCard(p, c);
    grid.appendChild(btn);
  }
}

// ════════════════════════════════════════
//  INTERACTIONS
// ════════════════════════════════════════
function togglePage(p) {
  const block = document.getElementById(`pb-${p}`);
  block.classList.toggle('open');
}

function toggleCard(p, c) {
  missing[currentAcc][p][c] = !missing[currentAcc][p][c];
  saveState();
  const btn = document.getElementById(`card-${p}-${c}`);
  if (btn) btn.classList.toggle('missing', missing[currentAcc][p][c]);
  refreshPageStatus(p);
  refreshTab(currentAcc);
}

function markPageAll(e, p) {
  e.stopPropagation();
  for (let c = 0; c < N_CARDS; c++) missing[currentAcc][p][c] = true;
  saveState(); renderCards(p); refreshPageStatus(p); refreshTab(currentAcc);
}

function markPageNone(e, p) {
  e.stopPropagation();
  for (let c = 0; c < N_CARDS; c++) missing[currentAcc][p][c] = false;
  saveState(); renderCards(p); refreshPageStatus(p); refreshTab(currentAcc);
}

function refreshPageStatus(p) {
  const cnt = pageCount(currentAcc, p);
  const el = document.getElementById(`pst-${p}`);
  const block = document.getElementById(`pb-${p}`);
  if (el) {
    el.className = `page-status ${cnt === 0 ? 'ok' : 'bad'}`;
    el.textContent = cnt === 0 ? '✓ Пълна' : `${cnt} липсват`;
  }
  if (block) {
    block.classList.toggle('has-missing', cnt > 0);
  }
}

function refreshTab(a) {
  const cnt = countMissing(a);
  const badge = document.querySelector(`#account-bar .acc-tab:nth-child(${a+1}) .acc-tab-badge`);
  if (badge) {
    badge.className = `acc-tab-badge ${cnt > 0 ? 'has-missing' : ''}`;
    badge.textContent = cnt > 0 ? `${cnt} ✗` : '✓ OK';
  }
}

function switchAcc(a) {
  currentAcc = a;
  renderTabs();
  renderPages();
}

function resetAll() {
  if (!confirm('Нулиране на всички данни от всички акаунти?')) return;
  initState();
  saveState();
  renderTabs();
  renderPages();
}

// ════════════════════════════════════════
//  CALCULATE TRANSFERS
// ════════════════════════════════════════
function calculate() {
  // Collect all missing cards per account
  // For each missing card → find which other accounts have it
  // Assign to least-loaded sender (greedy balance)

  let totalMissing = 0;
  let totalSolvable = 0;
  let totalUnsolvable = 0;

  // Structure: transfers[receiverIdx] = { fromSender: [{page,card}] }
  // unsolvable[receiverIdx] = [{page,card}]
  const transfers    = Array.from({length: N_ACC}, () => ({}));
  const unsolvable   = Array.from({length: N_ACC}, () => []);
  const senderLoad   = new Array(N_ACC).fill(0);  // load balancing

  for (let a = 0; a < N_ACC; a++) {
    for (let p = 0; p < N_PAGES; p++) {
      for (let c = 0; c < N_CARDS; c++) {
        if (!missing[a][p][c]) continue;
        totalMissing++;

        // Who has this card?
        const donors = [];
        for (let b = 0; b < N_ACC; b++) {
          if (b === a && !missing[b][p][c]) continue;  // same acc shouldn't self-donate
          if (b !== a && !missing[b][p][c]) donors.push(b);
        }

        if (donors.length === 0) {
          totalUnsolvable++;
          unsolvable[a].push({p, c});
        } else {
          // pick donor with lowest load
          donors.sort((x,y) => senderLoad[x] - senderLoad[y]);
          const donor = donors[0];
          senderLoad[donor]++;
          totalSolvable++;
          if (!transfers[a][donor]) transfers[a][donor] = [];
          transfers[a][donor].push({p, c});
        }
      }
    }
  }

  renderResults(transfers, unsolvable, totalMissing, totalSolvable, totalUnsolvable);
  document.getElementById('overlay').classList.add('open');
}

// ════════════════════════════════════════
//  RENDER RESULTS
// ════════════════════════════════════════
function renderResults(transfers, unsolvable, totalMissing, totalSolvable, totalUnsolvable) {
  const body = document.getElementById('modal-body');

  if (totalMissing === 0) {
    body.innerHTML = `
      <div class="success-state">
        <div class="s-icon">🏆</div>
        <div class="s-title">Всички колекции са пълни!</div>
        <div class="s-sub">Никой от 4-те акаунта няма липсващи карти.</div>
      </div>`;
    return;
  }

  // Check if any account has missing cards
  const hasAny = transfers.some((t,a) => Object.keys(t).length > 0 || unsolvable[a].length > 0);

  if (!hasAny) {
    body.innerHTML = `
      <div class="empty-state">
        <div class="e-icon">🃏</div>
        <div class="e-title">Няма маркирани липсващи карти</div>
        <div class="e-sub">Маркирай кои карти липсват на всеки акаунт и натисни отново.</div>
      </div>`;
    return;
  }

  let html = `
    <div class="result-summary">
      Общо липсващи: <span class="highlight">${totalMissing} карти</span><br>
      <span class="good">✓ Могат да се прехвърлят: ${totalSolvable}</span><br>
      ${totalUnsolvable > 0 ? `<span class="bad">✗ Никой няма: ${totalUnsolvable}</span>` : ''}
    </div>
  `;

  for (let a = 0; a < N_ACC; a++) {
    const senders = Object.keys(transfers[a]);
    const noone = unsolvable[a];
    if (senders.length === 0 && noone.length === 0) continue;

    html += `<div class="recv-block">`;
    html += `<div class="recv-label">
      <span class="recv-label-icon">${ACC_ICONS[a]}</span>
      ${ACC_NAMES[a]} получава:
    </div>`;

    for (const senderKey of senders) {
      const s = parseInt(senderKey);
      const cards = transfers[a][s];
      const pills = cards.map(({p,c}) =>
        `<span class="card-pill">С${p+1}/К${c+1}</span>`
      ).join('');
      html += `
        <div class="transfer-row">
          <div class="transfer-from">${ACC_ICONS[s]} ${ACC_NAMES[s]} изпраща (${cards.length} карти):</div>
          <div class="transfer-cards">${pills}</div>
        </div>`;
    }

    if (noone.length > 0) {
      const pills = noone.map(({p,c}) =>
        `<span class="card-pill">С${p+1}/К${c+1}</span>`
      ).join('');
      html += `
        <div class="transfer-row warn">
          <div class="transfer-from">⚠️ Никой акаунт няма тези карти (${noone.length}):</div>
          <div class="transfer-cards">${pills}</div>
        </div>`;
    }

    html += `</div><div class="divider"></div>`;
  }

  // Legend
  html += `<div style="text-align:center;font-size:11px;font-weight:700;color:var(--gray);margin-top:4px">
    С = Страница &nbsp;|&nbsp; К = Карта
  </div>`;

  body.innerHTML = html;
}

// ════════════════════════════════════════
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}
function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

// ════════════════════════════════════════
loadState();
renderTabs();
renderPages();
</script>
